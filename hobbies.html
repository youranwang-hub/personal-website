  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightbox">
    <button class="lightbox-close" id="lightboxClose" aria-label="关闭"></button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="上一张"><div class="lightbox-arrow"></div></button>
    <img src="" alt="" id="lightboxImg">
    <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="下一张"><div class="lightbox-arrow"></div></button>
    <div class="lightbox-counter" id="lightboxCounter"></div>
  </div>

  <script>
    // --- Gallery Data ---
    const galleryItems = document.querySelectorAll('.gallery-item');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxCounter = document.getElementById('lightboxCounter');
    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      const item = galleryItems[index];
      if (!item) return;
      const img = item.querySelector('img');
      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt;
      lightboxCounter.textContent = (index + 1) + ' / ' + galleryItems.length;
      lightbox.classList.add('open');
      updateNavButtons();
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function prevImage() {
      if (currentIndex > 0) {
        currentIndex--;
        const img = galleryItems[currentIndex].querySelector('img');
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        lightboxCounter.textContent = (currentIndex + 1) + ' / ' + galleryItems.length;
        updateNavButtons();
      }
    }

    function nextImage() {
      if (currentIndex < galleryItems.length - 1) {
        currentIndex++;
        const img = galleryItems[currentIndex].querySelector('img');
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        lightboxCounter.textContent = (currentIndex + 1) + ' / ' + galleryItems.length;
        updateNavButtons();
      }
    }

    function updateNavButtons() {
      document.getElementById('lightboxPrev').disabled = currentIndex === 0;
      document.getElementById('lightboxNext').disabled = currentIndex === galleryItems.length - 1;
    }

    // Event bindings
    galleryItems.forEach((item, i) => {
      item.addEventListener('click', () => openLightbox(i));
    });

    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    document.getElementById('lightboxPrev').addEventListener('click', prevImage);
    document.getElementById('lightboxNext').addEventListener('click', nextImage);

    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', function(e) {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'ArrowRight') nextImage();
    });

    // --- Page Turn Transition ---
    document.querySelectorAll('a[href]').forEach(link => {
      const href = link.getAttribute('href');
      if (!href || href === '#' || href.startsWith('http') || href.startsWith('mailto')) return;
      link.addEventListener('click', function(e) {
        e.preventDefault();
        const overlay = document.getElementById('pageOverlay');
        overlay.classList.add('active');
        setTimeout(() => { window.location.href = href; }, 560);
      });
    });
  </script>
